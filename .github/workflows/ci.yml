name: CI

on:
  pull_request:
    branches: [main, develop]
  push:
    branches: [main, develop]

# Hard Gates (siehe docs/development.md §3). Aktivieren sich, sobald Phase-0-Code
# existiert (pyproject.toml / src/). Bis dahin laufen sie no-op grün durch.

jobs:
  quality:
    name: Lint · Type · Test · Coverage
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - id: detect
        run: |
          if [ -f pyproject.toml ] || [ -d src ]; then echo "code=true" >> "$GITHUB_OUTPUT"; else echo "code=false" >> "$GITHUB_OUTPUT"; fi
      - uses: actions/setup-python@v6
        if: steps.detect.outputs.code == 'true'
        with:
          python-version: "3.12"
      - name: Install
        if: steps.detect.outputs.code == 'true'
        run: pip install -e ".[dev]" || pip install ruff mypy pytest pytest-cov
      - name: Lint (ruff)
        if: steps.detect.outputs.code == 'true'
        run: ruff check .
      - name: Format (ruff)
        if: steps.detect.outputs.code == 'true'
        run: ruff format --check .
      - name: Typecheck (mypy)
        if: steps.detect.outputs.code == 'true'
        run: mypy .
      - name: Tests + Coverage (>=80%)
        if: steps.detect.outputs.code == 'true'
        run: pytest --cov --cov-report=term-missing --cov-fail-under=80
      - name: Kein Code (Skeleton)
        if: steps.detect.outputs.code != 'true'
        run: echo "Kein Code — Gates aktivieren sich mit Phase 0."

  security:
    name: Security-Gate
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Secret-Scan (gitleaks)
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      - id: detect
        run: |
          if [ -f pyproject.toml ] || [ -d src ]; then echo "code=true" >> "$GITHUB_OUTPUT"; else echo "code=false" >> "$GITHUB_OUTPUT"; fi
      - uses: actions/setup-python@v6
        if: steps.detect.outputs.code == 'true'
        with:
          python-version: "3.12"
      - name: "SAST + Dependency-Audit (Start advisory)"
        if: steps.detect.outputs.code == 'true'
        run: |
          pip install bandit pip-audit semgrep
          bandit -r src -q || true
          pip-audit || true
          semgrep --config auto || true
      - name: wortlaut-Prinzip-Gate (kein LLM-Output im Serving-Layer)
        run: python scripts/check_no_llm_output.py

  architecture:
    name: Architektur-Fitness (Layering)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - id: detect
        run: |
          if [ -f .importlinter ] || [ -f setup.cfg ] || [ -f pyproject.toml ]; then echo "code=true" >> "$GITHUB_OUTPUT"; else echo "code=false" >> "$GITHUB_OUTPUT"; fi
      - uses: actions/setup-python@v6
        if: steps.detect.outputs.code == 'true'
        with:
          python-version: "3.12"
      - name: import-linter (Adapter → Kern verboten)
        if: steps.detect.outputs.code == 'true'
        run: |
          pip install -e ".[dev]"
          if [ -f .importlinter ] || grep -q "importlinter" pyproject.toml 2>/dev/null; then lint-imports; else echo "import-linter-Contracts folgen mit Phase 0."; fi
      - name: Kein Code (Skeleton)
        if: steps.detect.outputs.code != 'true'
        run: echo "Kein Code — Architektur-Gate aktiviert sich mit Phase 0."

  sonarcloud:
    name: SonarCloud (Code-Qualität)
    runs-on: ubuntu-latest
    # Aktiviert sich automatisch, sobald das Repo-Secret SONAR_TOKEN gesetzt ist.
    # Setup: docs/development.md / README. Läuft nicht für Fork-PRs (kein Secret).
    env:
      SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: actions/setup-python@v6
        if: ${{ env.SONAR_TOKEN != '' }}
        with:
          python-version: "3.12"
      - name: Coverage-Report für SonarCloud
        if: ${{ env.SONAR_TOKEN != '' }}
        run: |
          pip install -e ".[dev]"
          pytest --cov-report=xml
      - name: SonarCloud Scan
        if: ${{ env.SONAR_TOKEN != '' }}
        uses: SonarSource/sonarqube-scan-action@7006c4492b2e0ee0f816d36501671557c97f5995 # v8.1.0
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
      - name: SonarCloud inaktiv (kein Token)
        if: ${{ env.SONAR_TOKEN == '' }}
        run: echo "SONAR_TOKEN nicht gesetzt - SonarCloud-Gate inaktiv (R-QUAL-04). Setup siehe README/CONTRIBUTING."
