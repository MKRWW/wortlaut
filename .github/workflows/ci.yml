name: CI

on:
  pull_request:
    branches: [main, develop]
  push:
    branches: [main, develop]

# Hard Gates (docs/development.md §3, docs/rules.md). Alles via uv (ADR-0002).
# Integrationstests laufen gegen echte Postgres/pgvector via Testcontainers
# (Docker-Daemon auf dem Runner vorhanden).

jobs:
  quality:
    name: Lint · Type · Test · Coverage
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
      - uses: astral-sh/setup-uv@v6
        with:
          enable-cache: true
      - name: Install (reproduzierbar, uv.lock)
        run: uv sync --frozen --extra dev
      - name: Lint (ruff)
        run: uv run ruff check .
      - name: Format (ruff)
        run: uv run ruff format --check .
      - name: Typecheck (mypy)
        run: uv run mypy
      - name: Tests + Coverage (>=80%, inkl. Integration via Testcontainers)
        run: uv run pytest --cov-report=xml
      - name: Upload coverage
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: coverage
          path: coverage.xml
          if-no-files-found: ignore

  security:
    name: Security-Gate
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
        with:
          fetch-depth: 0
      - name: Secret-Scan (gitleaks)
        uses: gitleaks/gitleaks-action@v3
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
      - uses: astral-sh/setup-uv@v6
        with:
          enable-cache: true
      - name: Install
        run: uv sync --frozen --extra dev
      - name: "SAST + Dependency-Audit (Start advisory)"
        run: |
          uvx bandit -r src -q || true
          uvx pip-audit || true
          uvx semgrep --config auto || true
      - name: wortlaut-Prinzip-Gate (kein LLM-Output im Serving-Layer)
        run: uv run python scripts/check_no_llm_output.py

  architecture:
    name: Architektur-Fitness (Layering)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
      - uses: astral-sh/setup-uv@v6
        with:
          enable-cache: true
      - name: Install
        run: uv sync --frozen --extra dev
      - name: import-linter (Adapter → Kern verboten)
        run: uv run lint-imports

  sonarcloud:
    name: SonarCloud (Code-Qualität)
    runs-on: ubuntu-latest
    needs: quality
    env:
      SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
    steps:
      - uses: actions/checkout@v7
        with:
          fetch-depth: 0
      - name: Download coverage
        if: ${{ env.SONAR_TOKEN != '' }}
        uses: actions/download-artifact@v4
        with:
          name: coverage
      - name: SonarCloud Scan
        if: ${{ env.SONAR_TOKEN != '' }}
        uses: SonarSource/sonarqube-scan-action@22918119ff8e1ca75a623e15c8296b6ea4fbe28f # v8.2.1
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
      # Merge-Latte "alles gruen + 0 neue Sonar-Issues" (#37): das Free-Plan-Quality-Gate
      # kann nicht auf "New issues > 0 => Error" gestellt werden, also erzwingt dieser
      # Step die Regel selbst. Stdlib-only, kein uv noetig; Token nur im Header (R-SEC-01).
      - name: "Issues-Gate (0 offene Sonar-Issues im PR)"
        if: ${{ env.SONAR_TOKEN != '' && github.event_name == 'pull_request' }}
        run: python3 scripts/check_sonar_pr_issues.py "${{ github.event.pull_request.number }}"
      - name: SonarCloud inaktiv (kein Token)
        if: ${{ env.SONAR_TOKEN == '' }}
        run: echo "SONAR_TOKEN nicht gesetzt - SonarCloud-Gate inaktiv (R-QUAL-04). Setup siehe README/CONTRIBUTING."
