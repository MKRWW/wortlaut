version: 2
# GitFlow: Dependency-Updates zielen auf develop (nicht main/Default),
# damit sie den normalen Gate+Review-Weg nehmen und main nicht divergiert.
updates:
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
    target-branch: "develop"
    commit-message:
      prefix: "chore(deps)"
    labels: ["type/chore", "status/backlog"]

  - package-ecosystem: "pip"
    directory: "/"
    schedule:
      interval: "weekly"
    target-branch: "develop"
    commit-message:
      prefix: "chore(deps)"
    labels: ["type/chore", "status/backlog"]
