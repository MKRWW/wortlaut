# SonarCloud / SonarQube-Cloud-Konfiguration (R-QUAL-04).
# Aktiv, sobald das Repo-Secret SONAR_TOKEN gesetzt ist (CI-Job "sonarcloud").
# Keys bestätigt gegen sonarcloud.io.
sonar.projectKey=MKRWW_wortlaut
sonar.organization=mkrww

sonar.python.version=3.12
sonar.python.coverage.reportPaths=coverage.xml

# Doku/Skripte nicht analysieren.
sonar.exclusions=docs/**,scripts/**,**/migrations/**

# sonar.sources/sonar.tests bewusst NICHT gesetzt: bis Phase-0-Code existiert,
# gilt der Default (Repo-Root). Mit dem ersten src/-Code hier auf
#   sonar.sources=src
#   sonar.tests=tests
# verengen.
