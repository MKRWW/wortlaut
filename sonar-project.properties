# SonarCloud-Konfiguration (R-QUAL-04). Aktiviert, sobald das Repo-Secret
# SONAR_TOKEN gesetzt ist (siehe CI-Job "sonarcloud").
#
# WICHTIG: projectKey und organization nach dem Import auf sonarcloud.io
# gegenchecken — SonarCloud zeigt die exakten Werte an. Konvention unten.
sonar.projectKey=MKRWW_wortlaut
sonar.organization=mkrww

# Quellcode (aktiv ab Phase-0-Code unter src/)
sonar.sources=src
sonar.tests=tests
sonar.python.version=3.12

# Coverage-Report (aus pytest --cov, sobald Tests existieren)
sonar.python.coverage.reportPaths=coverage.xml

# Ausschlüsse
sonar.exclusions=docs/**,scripts/**,**/migrations/**
